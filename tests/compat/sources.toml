# Beancount Compatibility Test Sources
#
# This file documents the sources of beancount files used for compatibility testing.
# Each source includes the repository URL, the commit/tag used, and license information.
#
# Curated files in tests/compat/ are committed to the repository.
# Full test suite in tests/compat-full/ is downloaded on-demand via fetch script.

[meta]
description = "Compatibility test files for rustledger vs Python beancount"
last_updated = "2026-01-20"
total_curated_files = 93
total_full_files = 816

# =============================================================================
# Official Beancount Repositories
# =============================================================================

[sources.beancount-v2]
name = "Beancount v2"
url = "https://github.com/beancount/beancount"
branch = "v2"
license = "GPL-2.0"
description = "Original Python beancount implementation"
paths = ["beancount/parser/testdata/", "examples/"]
file_count = 8

