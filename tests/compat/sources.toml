# =============================================================================
# Curated File Selection Criteria
# =============================================================================

[curation]
description = """
The curated subset in tests/compat/ is selected to provide comprehensive
coverage while keeping the committed file count manageable (~100 files).

Selection criteria:
1. Representative of each source repository
2. Cover different beancount features (transactions, balances, prices, etc.)
3. Include edge cases that have caused compatibility issues
4. Avoid duplicate or near-duplicate content
5. Prefer smaller files when content is similar
"""

categories = [
    { name = "parser", description = "Parser edge cases and syntax variations", count = 30 },
    { name = "validation", description = "Validation scenarios (balancing, accounts)", count = 25 },
    { name = "plugins", description = "Plugin usage and configuration", count = 15 },
    { name = "real-world", description = "Real-world ledger examples", count = 20 },
    { name = "edge-cases", description = "Known compatibility edge cases", count = 10 },
]
