[package]
name = "rustledger-booking-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
rust_decimal = "1"

[dependencies.rustledger-booking]
path = ".."

[dependencies.rustledger-core]
path = "../../rustledger-core"

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "fuzz_booking"
path = "fuzz_targets/fuzz_booking.rs"
test = false
doc = false
bench = false
