# prek configuration
# Install: cargo install prek (or use nix)
# Setup: prek install
# Run: prek run --all-files
#
# Note: This config uses local hooks for maximum compatibility.
# Hooks that require external tools (typos, gitleaks, nil, commitizen)
# will be skipped if the tool is not available.

repos:
  - repo: local
    hooks:
      # === Pre-commit hooks (fast, run on every commit) ===

      # Rust formatting
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      # Typos - spell checker
      - id: typos
        name: typos
        entry: typos --locale en-us
        language: system
        types: [text]

      # Gitleaks - secrets detection
      - id: gitleaks
        name: gitleaks
        entry: gitleaks git --staged --redact --config .gitleaks.toml
        language: system
        pass_filenames: false

      # Nix linting
      - id: nil
        name: nil
        entry: nil diagnostics
        language: system
        files: \.nix$

      # === Commit-msg hooks ===

      # Commitizen - commit message format
      - id: commitizen
        name: commitizen
        entry: cz check --allow-abort --commit-msg-file
        language: system
        stages: [commit-msg]
        pass_filenames: true

      # === Pre-push hooks (fast checks only - heavy checks run in CI) ===

      # Branch name validation
      - id: branch-name
        name: branch-name
        entry: ./scripts/check-branch-name.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      # NOTE: clippy, cargo-test, and cargo-doc are intentionally NOT run
      # as pre-push hooks because they take too long (10-30 minutes for full
      # workspace). These checks run in CI instead where they can be parallelized
      # and cached. Use `cargo clippy` and `cargo test` manually before pushing
      # if you want to catch issues early.
