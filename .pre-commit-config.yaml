# prek configuration
# Install: cargo install prek (or use nix)
# Setup: prek install
# Run: prek run --all-files
#
# Note: This config uses local hooks for maximum compatibility.
# Hooks that require external tools (typos, gitleaks, nil, commitizen)
# will be skipped if the tool is not available.
repos:
  - repo: local
    hooks:
      # === Pre-commit hooks (fast, run on every commit) ===

      # Rust formatting
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false
      # Typos - spell checker
      - id: typos
        name: typos
        entry: typos --locale en-us
        language: system
        types: [text]
      # Gitleaks - secrets detection
      - id: gitleaks
        name: gitleaks
        entry: gitleaks git --staged --redact --config .gitleaks.toml
        language: system
        pass_filenames: false
      # Nix linting
      - id: nil
        name: nil
        entry: nil diagnostics
        language: system
        files: \.nix$
      # === Commit-msg hooks ===

      # Commitizen - commit message format
      - id: commitizen
        name: commitizen
        entry: cz check --allow-abort --commit-msg-file
        language: system
        stages: [commit-msg]
        pass_filenames: true
      # === Pre-push hooks (fast checks only - heavy checks run in CI) ===

      # NOTE: Branch name validation runs in CI (branch-name.yml).
      # NOTE: clippy, cargo-test, and cargo-doc are intentionally NOT run
      # as pre-push hooks because they take too long (10-30 minutes for full
      # workspace). These checks run in CI instead where they can be parallelized
      # and cached. Use `cargo clippy` and `cargo test` manually before pushing
      # if you want to catch issues early.
      #
      # `cargo check` IS run as a pre-push hook. Unlike clippy/test, it
      # skips codegen and lint passes and is typically 2-30 seconds on a
      # warm incremental cache. Its job is specifically to catch compile
      # errors (hallucinated APIs, missing imports, type mismatches,
      # `unsafe` in forbid-unsafe-code crates) before a PR is opened.
      # Closed PRs #768 and #769 each wasted a CI run because their
      # authors pushed without running `cargo check` locally; this hook
      # makes it impossible to repeat that mistake accidentally. Use
      # `git push --no-verify` to bypass if you're intentionally pushing
      # a WIP commit for backup.

      # Cargo check - fast compile verification before push.
      #
      # `always_run: true` is deliberate: a `Cargo.toml` or
      # `Cargo.lock` change can introduce compile errors (dependency
      # version bumps, feature flag changes, removed crates) without
      # touching any `.rs` file. If we gated this hook on
      # `types: [rust]`, a `Cargo.toml`-only push would skip it and
      # the errors would only surface in CI. Running on every push
      # catches the whole class early at ~2-30s on a warm cache.
      - id: cargo-check
        name: cargo check --workspace --all-features --all-targets
        entry: cargo check --workspace --all-features --all-targets
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      # Forbid-unsafe-code invariant check - grep-level, runs in ms.
      # Complements the cargo-check hook above. cargo-check catches the
      # violation as a compile error; this script surfaces it with a
      # clearer message that points at both the violation site and the
      # forbid directive. See scripts/check-unsafe-invariant.sh for the
      # full rationale.
      #
      # Also `always_run: true`: `#![forbid(unsafe_code)]` lives in the
      # crate entry files, and somebody could push a change to those
      # that adds or removes the directive without touching any other
      # `.rs` file in the same push. Running unconditionally keeps the
      # check honest.
      - id: unsafe-invariant
        name: verify forbid-unsafe-code invariant
        entry: scripts/check-unsafe-invariant.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      # Plugin-test policy lint — sub-second grep-level check that
      # enforces the rules from CONTRIBUTING.md → "Plugin testing
      # requirements". Catches weak count assertions and `(partial)`
      # test ports that historically masked plugin bugs (see issue #992).
      # Runs on every push because policy violations can land in any
      # PR that touches the plugin tests directory; the cost is
      # negligible and CI also enforces the same script.
      - id: plugin-test-quality
        name: plugin-test-quality (CONTRIBUTING.md policies)
        entry: scripts/check-plugin-test-quality.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      # Bean-price compatibility harness — only fires when files that could
      # change rledger ↔ bean-price discovery behavior are touched. Runs
      # inside `nix develop` so `bean-price` is on PATH (added in #976).
      # `nix develop --command` is required: CI doesn't run this harness
      # (issue #967 acceptance criterion #1 is enforced locally only),
      # so this hook is the only line of defense against silent regressions.
      - id: bean-price-compat
        name: bean-price compat tests (rledger price <-> bean-price)
        entry: nix develop --command cargo test -p rustledger --test bean_price_compat
        language: system
        pass_filenames: false
        files: ^(crates/rustledger/src/cmd/price(_cmd\.rs|/.*)|crates/rustledger/tests/bean_price_compat\.rs|flake\.(nix|lock))$
        stages: [pre-push]
