# Auto-update cargo-vet exemptions for Dependabot PRs
# This prevents cargo-deny check failures when Dependabot updates dependencies
name: Cargo Vet Auto

on:
  pull_request:
    paths:
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  update-exemptions:
    name: Update Exemptions
    runs-on: ubuntu-latest
    # Only run for Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Install cargo-vet
        uses: taiki-e/install-action@30791125b88ed3200de59e9b5edbf78d1949e41f # v2

      - name: Regenerate exemptions
        run: cargo vet regenerate exemptions

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Get the GitHub App's user ID for proper commit attribution
          APP_USER=$(gh api /users/rustledger-bot[bot] --jq '.id' 2>/dev/null || echo "")
          if [ -n "$APP_USER" ]; then
            git config user.name "rustledger-bot[bot]"
            git config user.email "${APP_USER}+rustledger-bot[bot]@users.noreply.github.com"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fi

          git add supply-chain/
          if git diff --staged --quiet; then
            echo "No exemption changes needed"
          else
            git commit -m "chore: regenerate cargo-vet exemptions"
            git push
            echo "Exemptions updated and pushed (signed by rustledger-bot)"
          fi
