# Auto-update cargo-vet exemptions for Dependabot PRs
# This prevents cargo-deny check failures when Dependabot updates dependencies
name: Cargo Vet Auto

# SECURITY: Using pull_request_target to avoid untrusted checkout vulnerability (CodeQL alert #82).
# This workflow only runs for dependabot[bot] and only modifies supply-chain/ files.
# The PR's Cargo.lock is fetched explicitly after checking out the base branch.
on:
  pull_request_target:
    paths:
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  update-exemptions:
    name: Update Exemptions
    runs-on: ubuntu-latest
    # Only run for Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      # SECURITY: Checkout base branch first (trusted code), then fetch only Cargo.lock from PR
      - name: Checkout base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6
        with:
          ref: ${{ github.base_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch PR's Cargo.lock
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Fetch only Cargo.lock from the PR branch (not arbitrary code)
          gh api "repos/${{ github.repository }}/contents/Cargo.lock?ref=${{ github.event.pull_request.head.sha }}" \
            --jq '.content' | base64 -d > Cargo.lock

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Install cargo-vet
        uses: taiki-e/install-action@30791125b88ed3200de59e9b5edbf78d1949e41f # v2
        with:
          tool: cargo-vet

      - name: Regenerate exemptions
        run: cargo vet regenerate exemptions

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # SECURITY: Pass via env vars to prevent shell injection from branch names
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git add supply-chain/
          if git diff --staged --quiet; then
            echo "No exemption changes needed"
          else
            # Use GitHub API to create commits (signed by GitHub)
            # This is required because branch protection requires signed commits
            COMMIT_MSG="chore: regenerate cargo-vet exemptions"

            # Get the current commit SHA
            CURRENT_SHA=$(gh api "repos/$REPO/git/refs/heads/$BRANCH" --jq '.object.sha')
            echo "Current commit: $CURRENT_SHA"

            # Get the tree SHA from the current commit
            BASE_TREE=$(gh api "repos/$REPO/git/commits/$CURRENT_SHA" --jq '.tree.sha')
            echo "Base tree: $BASE_TREE"

            # Create blobs for all changed files in supply-chain/
            TREE_ENTRIES="[]"
            for file in $(git diff --staged --name-only); do
              if [ -f "$file" ]; then
                CONTENT=$(base64 -w 0 "$file")
                BLOB_SHA=$(gh api "repos/$REPO/git/blobs" \
                  -f encoding=base64 \
                  -f content="$CONTENT" \
                  --jq '.sha')
                echo "Created blob for $file: $BLOB_SHA"
                TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq --arg path "$file" --arg sha "$BLOB_SHA" \
                  '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]')
              fi
            done

            # Create new tree
            NEW_TREE=$(jq -n --argjson tree "$TREE_ENTRIES" --arg base "$BASE_TREE" \
              '{tree: $tree, base_tree: $base}' | \
              gh api "repos/$REPO/git/trees" --input - --jq '.sha')
            echo "New tree: $NEW_TREE"

            # Create commit (GitHub will sign this)
            NEW_COMMIT=$(gh api "repos/$REPO/git/commits" \
              -f message="$COMMIT_MSG" \
              -f tree="$NEW_TREE" \
              -f "parents[]=$CURRENT_SHA" \
              --jq '.sha')
            echo "New commit: $NEW_COMMIT"

            # Update branch reference
            gh api "repos/$REPO/git/refs/heads/$BRANCH" \
              -X PATCH \
              -f sha="$NEW_COMMIT" \
              -F force=false

            echo "Exemptions updated (signed via GitHub API)"
          fi
