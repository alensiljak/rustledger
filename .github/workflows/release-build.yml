# Release Build Workflow
# ======================
# Triggered on version tags (v*). Builds binaries and creates GitHub Release.
# Distribution to package managers (including crates.io) is handled by release-publish.yml.
#
# WHAT THIS WORKFLOW DOES
# -----------------------
# 1. Build native binaries for all platforms (with PGO where possible)
# 2. Build WASM package
# 3. Build FFI-WASI package
# 4. Create GitHub Release with all artifacts
#
# SECRETS REQUIRED
# ----------------
# - BOT_APP_ID / BOT_PRIVATE_KEY: GitHub App for creating release (triggers release-publish.yml)
#
name: Release Build
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
        type: string
permissions:
  contents: write
  id-token: write  # Required for crates.io trusted publishing (OIDC)
env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
jobs:
  # Validate that tag version matches rustledger crate version
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - name: Validate tag matches rustledger crate version
        run: |
          # Extract version from tag (strip 'v' prefix)
          TAG_VERSION="${RELEASE_TAG#v}"

          # Extract version from the main rustledger crate using cargo metadata
          # This is more robust than grepping Cargo.toml as it handles workspace inheritance
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | \
            jq -r '.packages[] | select(.name == "rustledger") | .version')

          # Check if version extraction succeeded
          if [ -z "$CARGO_VERSION" ] || [ "$CARGO_VERSION" = "null" ]; then
            echo "::error::Failed to extract rustledger crate version from cargo metadata."
            echo "::error::Ensure that the 'rustledger' package exists in the workspace."
            exit 1
          fi

          echo "Tag version: $TAG_VERSION"
          echo "rustledger crate version: $CARGO_VERSION"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Tag is $TAG_VERSION but rustledger crate has $CARGO_VERSION"
            echo "::error::Please update all crate versions before tagging."
            echo "::error::Use: release-plz set-version rustledger@$TAG_VERSION ..."
            exit 1
          fi

          echo "Version validated successfully!"

  build:
    name: Build ${{ matrix.target }}
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (glibc) - PGO enabled for native target
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pgo: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          # Linux (musl - static binaries) - cross-compiled, no PGO
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # macOS - ARM runner for both (Intel runners deprecated)
          - target: x86_64-apple-darwin
            os: macos-latest
            # No PGO - can't run x86 binary on ARM runner
          - target: aarch64-apple-darwin
            os: macos-latest
            pgo: true
          # Windows - PGO enabled for x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            pgo: true
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            # No PGO - can't run ARM binary on x86 runner
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools-preview
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@db5fe14d0f31ad3d2c6c8dbee23472867de1cc54 # cross
      - name: Install cargo-pgo
        if: matrix.pgo
        run: cargo install cargo-pgo
      - name: Generate benchmark for PGO (Unix)
        if: matrix.pgo && runner.os != 'Windows'
        run: |
          # Generate a representative workload for PGO profiling
          python3 << 'EOF'
          import random
          from datetime import date, timedelta
          import os
          random.seed(42)
          accounts = [
              "Assets:Bank:Checking", "Assets:Bank:Savings", "Assets:Investments:Stocks",
              "Liabilities:CreditCard", "Expenses:Food:Groceries", "Expenses:Food:Restaurant",
              "Expenses:Transport:Gas", "Expenses:Utilities:Electric", "Income:Salary", "Equity:Opening-Balances",
          ]
          benchmark_path = os.path.join(os.environ.get('RUNNER_TEMP', '/tmp'), 'benchmark.beancount')
          with open(benchmark_path, "w") as f:
              f.write('option "operating_currency" "USD"\n\n')
              for acc in accounts:
                  f.write(f"2020-01-01 open {acc}\n")
              f.write("\n")
              start_date = date(2020, 1, 1)
              for i in range(10000):
                  d = start_date + timedelta(days=i // 10)
                  amount = round(random.uniform(5, 500), 2)
                  expense = random.choice([a for a in accounts if a.startswith("Expenses:")])
                  source = random.choice(["Assets:Bank:Checking", "Liabilities:CreditCard"])
                  f.write(f'{d} * "Payee {i % 100}" "Transaction {i}"\n')
                  f.write(f"  {expense}  {amount} USD\n")
                  f.write(f"  {source}\n\n")
          print(f"Generated benchmark at {benchmark_path}")
          EOF
      - name: Generate benchmark for PGO (Windows)
        if: matrix.pgo && runner.os == 'Windows'
        shell: pwsh
        run: |
          $benchmarkPath = Join-Path $env:RUNNER_TEMP "benchmark.beancount"
          $random = New-Object System.Random(42)
          $accounts = @(
              "Assets:Bank:Checking", "Assets:Bank:Savings", "Assets:Investments:Stocks",
              "Liabilities:CreditCard", "Expenses:Food:Groceries", "Expenses:Food:Restaurant",
              "Expenses:Transport:Gas", "Expenses:Utilities:Electric", "Income:Salary", "Equity:Opening-Balances"
          )
          $expenseAccounts = $accounts | Where-Object { $_ -like "Expenses:*" }
          $sourceAccounts = @("Assets:Bank:Checking", "Liabilities:CreditCard")
          $content = @('option "operating_currency" "USD"', '')
          foreach ($acc in $accounts) {
              $content += "2020-01-01 open $acc"
          }
          $content += ''
          $startDate = [DateTime]::new(2020, 1, 1)
          for ($i = 0; $i -lt 10000; $i++) {
              $d = $startDate.AddDays([Math]::Floor($i / 10)).ToString("yyyy-MM-dd")
              $amount = [Math]::Round($random.NextDouble() * 495 + 5, 2)
              $expense = $expenseAccounts[$random.Next($expenseAccounts.Length)]
              $source = $sourceAccounts[$random.Next($sourceAccounts.Length)]
              $content += "$d * `"Payee $($i % 100)`" `"Transaction $i`""
              $content += "  $expense  $amount USD"
              $content += "  $source"
              $content += ''
          }
          $content | Out-File -FilePath $benchmarkPath -Encoding utf8
          Write-Host "Generated benchmark at $benchmarkPath"
      - name: Build with PGO (Unix)
        if: matrix.pgo && runner.os != 'Windows'
        shell: bash
        run: |
          BENCHMARK_PATH="${RUNNER_TEMP}/benchmark.beancount"

          # macOS: Use classic linker to avoid Xcode 15 crashes on long symbol names
          if [ "${{ runner.os }}" = "macOS" ]; then
            export RUSTFLAGS="-C link-arg=-Wl,-ld_classic"
          fi

          # Step 1: Build instrumented binary
          cargo pgo build -- --no-default-features --features bean-compat

          # Step 2: Run workload to collect profile data
          for i in {1..10}; do
            ./target/${{ matrix.target }}/release/rledger check "$BENCHMARK_PATH" > /dev/null 2>&1
          done

          # Step 3: Build optimized binary using profile data
          cargo pgo optimize build -- --no-default-features --features bean-compat

          # Build LSP separately (no PGO, no bean-compat)
          cargo build --release --target ${{ matrix.target }} -p rustledger-lsp
      - name: Build with PGO (Windows)
        if: matrix.pgo && runner.os == 'Windows'
        shell: pwsh
        run: |
          $benchmarkPath = Join-Path $env:RUNNER_TEMP "benchmark.beancount"

          # Step 1: Build instrumented binary
          cargo pgo build -- --no-default-features --features bean-compat

          # Step 2: Run workload to collect profile data
          for ($i = 0; $i -lt 10; $i++) {
            & "./target/${{ matrix.target }}/release/rledger.exe" check $benchmarkPath | Out-Null
          }

          # Step 3: Build optimized binary using profile data
          cargo pgo optimize build -- --no-default-features --features bean-compat

          # Build LSP separately (no PGO, no bean-compat)
          cargo build --release --target ${{ matrix.target }} -p rustledger-lsp
      - name: Build without PGO (cross-compiled targets)
        if: ${{ !matrix.pgo }}
        shell: bash
        run: |
          # macOS: Use classic linker to avoid Xcode 15 crashes on long symbol names
          if [ "${{ runner.os }}" = "macOS" ]; then
            export RUSTFLAGS="-C link-arg=-Wl,-ld_classic"
          fi

          # Linux: Use full LTO profile for better performance
          PROFILE="release"
          if [ "${{ runner.os }}" = "Linux" ]; then
            PROFILE="release-linux"
          fi

          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --profile $PROFILE --target ${{ matrix.target }} --no-default-features --features bean-compat
            # Build LSP separately (no bean-compat feature needed)
            cross build --profile $PROFILE --target ${{ matrix.target }} -p rustledger-lsp
          else
            cargo build --profile $PROFILE --target ${{ matrix.target }} --no-default-features --features bean-compat
            # Build LSP separately (no bean-compat feature needed)
            cargo build --profile $PROFILE --target ${{ matrix.target }} -p rustledger-lsp
          fi
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Determine profile directory (release-linux on Linux non-PGO, release otherwise)
          PROFILE_DIR="release"
          if [ "${{ runner.os }}" = "Linux" ] && [ "${{ matrix.pgo }}" != "true" ]; then
            PROFILE_DIR="release-linux"
          fi

          cd target/${{ matrix.target }}/$PROFILE_DIR

          # Get version from tag (RELEASE_TAG is set at workflow level)
          VERSION=$RELEASE_TAG

          # Create archive with all binaries
          ARCHIVE="rustledger-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czvf "../../../${ARCHIVE}" \
            rledger rledger-lsp \
            bean-check bean-format bean-query bean-report bean-doctor bean-extract bean-price

          # Create checksum
          cd ../../..
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release

          # Get version from tag (RELEASE_TAG is set at workflow level)
          $VERSION = $env:RELEASE_TAG

          # Create archive with all binaries
          $ARCHIVE = "rustledger-${VERSION}-${{ matrix.target }}.zip"
          $binaries = @(
            "rledger.exe", "rledger-lsp.exe",
            "bean-check.exe", "bean-format.exe", "bean-query.exe", "bean-report.exe", "bean-doctor.exe", "bean-extract.exe", "bean-price.exe"
          )
          Compress-Archive -Path $binaries -DestinationPath "../../../${ARCHIVE}"

          # Create checksum
          cd ../../..
          (Get-FileHash -Algorithm SHA256 $ARCHIVE).Hash.ToLower() + "  " + $ARCHIVE | Out-File -Encoding utf8 "${ARCHIVE}.sha256"
      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6
        with:
          name: rustledger-${{ matrix.target }}
          path: |
            rustledger-*.tar.gz
            rustledger-*.zip
            rustledger-*.sha256

  build-wasm:
    name: Build WASM
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM package
        run: |
          cd crates/rustledger-wasm
          wasm-pack build --target web --release
      - name: Prepare package
        run: |
          VERSION=${RELEASE_TAG#v}
          cd crates/rustledger-wasm/pkg
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json
          sed -i 's/"name": "rustledger-wasm"/"name": "@rustledger\/wasm"/' package.json
      - name: Upload WASM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6
        with:
          name: wasm-package
          path: crates/rustledger-wasm/pkg/

  build-ffi-wasi:
    name: Build FFI-WASI
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: wasm32-wasip1
      - name: Build FFI-WASI binary
        run: cargo build --release --target wasm32-wasip1 -p rustledger-ffi-wasi
      - name: Package FFI-WASI
        run: |
          VERSION=$RELEASE_TAG
          cp target/wasm32-wasip1/release/rustledger-ffi-wasi.wasm "rustledger-ffi-wasi-${VERSION}.wasm"
          shasum -a 256 "rustledger-ffi-wasi-${VERSION}.wasm" > "rustledger-ffi-wasi-${VERSION}.wasm.sha256"
      - name: Upload FFI-WASI artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6
        with:
          name: ffi-wasi-package
          path: |
            rustledger-ffi-wasi-*.wasm
            rustledger-ffi-wasi-*.sha256

  release:
    name: Create Release
    needs: [build, build-wasm, build-ffi-wasi]
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Download all artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Package WASM for release
        run: |
          VERSION=$RELEASE_TAG
          # WASM files are in artifacts root after merge-multiple
          mkdir -p wasm-pkg
          cp artifacts/*.wasm artifacts/*.js artifacts/*.d.ts artifacts/package.json wasm-pkg/ 2>/dev/null
          if [ ! -f "wasm-pkg/package.json" ]; then
            echo "Error: wasm-pkg/package.json not found; cannot package WASM artifacts." >&2
            exit 1
          fi
          if ! ls wasm-pkg/*.wasm >/dev/null 2>&1; then
            echo "Error: No .wasm files found in wasm-pkg; WASM build may have failed." >&2
            exit 1
          fi
          if ! ls wasm-pkg/*.js >/dev/null 2>&1; then
            echo "Error: No .js files found in wasm-pkg; WASM build may have failed." >&2
            exit 1
          fi
          cd wasm-pkg
          tar -czvf "../artifacts/rustledger-wasm-${VERSION}.tar.gz" .
          cd ..
          shasum -a 256 "artifacts/rustledger-wasm-${VERSION}.tar.gz" > "artifacts/rustledger-wasm-${VERSION}.tar.gz.sha256"
      - name: List artifacts
        run: ls -la artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.wasm
            artifacts/*.sha256
        env:
          # Use GitHub App token instead of GITHUB_TOKEN to trigger release-publish.yml workflow
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
