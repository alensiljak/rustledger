name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - 'review-and-fix'
          - 'review-only'
          - 'review-all-open'
        default: 'review-and-fix'
      issue_number:
        description: 'Issue number (leave empty for review-all-open)'
        required: false
        type: number
jobs:
  # Triggered by /oc or /opencode in comments
  opencode-comment:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      github.event.comment.user.type != 'Bot' &&
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          persist-credentials: false
      - name: Run opencode
        uses: anomalyco/opencode/github@21d7a85e76983026bdd131b045f197386ef4c7ab # latest as of 2026-03-30
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        with:
          model: togetherai/zai-org/GLM-5
  # Triggered by adding 'opencode:fix' label to an issue
  opencode-label-fix:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'opencode:fix'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          persist-credentials: false
      - name: Run opencode (review and fix)
        uses: anomalyco/opencode/github@21d7a85e76983026bdd131b045f197386ef4c7ab
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        with:
          model: togetherai/zai-org/GLM-5
          prompt: |
            Review issue #${{ github.event.issue.number }} in this repository.

            1. First, validate if this is a legitimate issue:
               - Is the problem clearly described?
               - Can the issue be reproduced or understood from the description?
               - Is it within scope of this project?

            2. If the issue is NOT valid or unclear:
               - Comment on the issue explaining what's missing or why it's invalid
               - Request clarification if needed

            3. If the issue IS valid:
               - Analyze the codebase to understand the root cause
               - Implement a fix on a new branch
               - Include appropriate tests
               - Open a PR that closes the issue
      - name: Remove trigger label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue edit ${{ github.event.issue.number }} --remove-label "opencode:fix"
  # Triggered by adding 'opencode:review' label to an issue
  opencode-label-review:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'opencode:review'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          persist-credentials: false
      - name: Run opencode (review only)
        uses: anomalyco/opencode/github@21d7a85e76983026bdd131b045f197386ef4c7ab
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        with:
          model: togetherai/zai-org/GLM-5
          prompt: |
            Review issue #${{ github.event.issue.number }} in this repository.

            Analyze the issue and provide a detailed comment with:
            1. Whether this is a valid, actionable issue
            2. If valid: root cause analysis and suggested implementation approach
            3. If invalid/unclear: what information is missing
            4. Estimated complexity (trivial, small, medium, large)
            5. Which files would likely need changes

            Do NOT create a PR - only add a comment to the issue.
      - name: Remove trigger label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue edit ${{ github.event.issue.number }} --remove-label "opencode:review"
  # Manual trigger for single issue
  opencode-review-issue:
    if: github.event_name == 'workflow_dispatch' && inputs.action != 'review-all-open'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          persist-credentials: false
      - name: Run opencode (review and fix)
        if: inputs.action == 'review-and-fix'
        uses: anomalyco/opencode/github@21d7a85e76983026bdd131b045f197386ef4c7ab
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        with:
          model: togetherai/zai-org/GLM-5
          prompt: |
            Review issue #${{ inputs.issue_number }} in this repository.

            1. First, validate if this is a legitimate issue:
               - Is the problem clearly described?
               - Can the issue be reproduced or understood from the description?
               - Is it within scope of this project?

            2. If the issue is NOT valid or unclear:
               - Comment on the issue explaining what's missing or why it's invalid
               - Request clarification if needed

            3. If the issue IS valid:
               - Analyze the codebase to understand the root cause
               - Implement a fix on a new branch
               - Include appropriate tests
               - Open a PR that closes the issue
      - name: Run opencode (review only)
        if: inputs.action == 'review-only'
        uses: anomalyco/opencode/github@21d7a85e76983026bdd131b045f197386ef4c7ab
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        with:
          model: togetherai/zai-org/GLM-5
          prompt: |
            Review issue #${{ inputs.issue_number }} in this repository.

            Analyze the issue and provide a detailed comment with:
            1. Whether this is a valid, actionable issue
            2. If valid: root cause analysis and suggested implementation approach
            3. If invalid/unclear: what information is missing
            4. Estimated complexity (trivial, small, medium, large)
            5. Which files would likely need changes

            Do NOT create a PR - only add a comment to the issue.
  # Batch review of all open issues
  get-open-issues:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'review-all-open'
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      issues: ${{ steps.get-issues.outputs.issues }}
    steps:
      - name: Get open issues
        id: get-issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issues=$(gh issue list --repo ${{ github.repository }} --state open --json number --jq '[.[].number]')
          echo "issues=$issues" >> $GITHUB_OUTPUT
          echo "Found issues: $issues"
  opencode-review-all:
    needs: get-open-issues
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'review-all-open'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    strategy:
      matrix:
        issue: ${{ fromJson(needs.get-open-issues.outputs.issues) }}
      max-parallel: 1 # Process one at a time to avoid conflicts
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          persist-credentials: false
      - name: Run opencode on issue #${{ matrix.issue }}
        uses: anomalyco/opencode/github@21d7a85e76983026bdd131b045f197386ef4c7ab
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        with:
          model: togetherai/zai-org/GLM-5
          prompt: |
            Review issue #${{ matrix.issue }} in this repository.

            Analyze the issue and provide a detailed comment with:
            1. Whether this is a valid, actionable issue
            2. If valid: root cause analysis and suggested implementation approach
            3. If invalid/unclear: what information is missing
            4. Estimated complexity (trivial, small, medium, large)
            5. Which files would likely need changes

            Do NOT create a PR - only add a comment to the issue with your analysis.
