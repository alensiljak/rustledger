# Mutation Testing with cargo-mutants
#
# Mutation testing injects bugs into the code and checks if tests catch them.
# This finds undertested code that coverage metrics miss.
#
# Runs on:
# - Monthly schedule (1st of each month)
# - PR changes to core crates and critical pipeline crates
# - Manual trigger with configurable packages
#
# Each package is mutated in its OWN matrix job (#1238): the curated audit set
# (core + parser + pipeline) is several thousand mutants, far more than one
# 180-minute runner can finish — a single combined job would hit the timeout
# and fail. Per-package jobs run in parallel, each with its own time budget.
#
# See: https://mutants.rs/
#
name: Mutation Testing
on:
  schedule:
    # Monthly on 1st at 6 AM UTC
    - cron: '0 6 1 * *'
  pull_request:
    paths:
      # TLA+-verified modules (inventory, booking, validation)
      - 'crates/rustledger-core/src/inventory/**'
      - 'crates/rustledger-booking/src/**'
      - 'crates/rustledger-validate/src/**'
      # Critical pipeline crates (#774, #775, #776)
      - 'crates/rustledger-loader/src/**'
      - 'crates/rustledger-plugin/src/**'
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to test (comma-separated, or "all")'
        required: false
        default: 'rustledger-core'
        type: string
      timeout:
        description: 'Timeout per mutant in seconds'
        required: false
        default: '300'
        type: string
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  # Select the package set for this run and emit it as a JSON array, so the
  # `mutants` job can fan out one runner per package.
  select-packages:
    name: Select packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
    steps:
      - id: select
        run: |
          INPUT="${{ github.event.inputs.packages || '' }}"
          # Curated audit set: core + parser + the critical pipeline crates
          # (CLI, LSP and WASM are intentionally excluded — too slow / not the
          # correctness-critical core).
          ALL='["rustledger-core","rustledger-parser","rustledger-booking","rustledger-validate","rustledger-loader","rustledger-plugin"]'
          if [ "$INPUT" = "all" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            MATRIX="$ALL"
          elif [ -n "$INPUT" ]; then
            # Manual comma-separated input -> JSON array of packages.
            MATRIX=$(printf '%s' "$INPUT" | tr ',' '\n' | sed '/^$/d; s/^/"/; s/$/"/' | paste -sd, - | sed 's/^/[/; s/$/]/')
          else
            # pull_request (path-triggered): curated default.
            MATRIX='["rustledger-core"]'
          fi
          echo "Selected packages: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  mutants:
    name: Mutate ${{ matrix.package }}
    needs: select-packages
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      # One package's timeout/failure must not cancel the others.
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.select-packages.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          prefix-key: mutants-${{ matrix.package }}
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation testing
        run: |
          TIMEOUT="${{ github.event.inputs.timeout || '300' }}"
          echo "Mutating package: ${{ matrix.package }}"
          echo "Timeout per mutant: ${TIMEOUT}s"
          echo ""

          # Run mutants with timeout and parallel jobs
          cargo mutants \
            --timeout "$TIMEOUT" \
            --jobs 4 \
            --package "${{ matrix.package }}" \
            -- --all-features \
            2>&1 | tee mutants-output.txt
      - name: Parse results
        id: results
        run: |
          # Extract summary statistics
          if [ -f "mutants.out/caught.txt" ]; then
            CAUGHT=$(wc -l < mutants.out/caught.txt | tr -d ' ')
          else
            CAUGHT=0
          fi

          if [ -f "mutants.out/missed.txt" ]; then
            MISSED=$(wc -l < mutants.out/missed.txt | tr -d ' ')
          else
            MISSED=0
          fi

          if [ -f "mutants.out/timeout.txt" ]; then
            TIMEOUT=$(wc -l < mutants.out/timeout.txt | tr -d ' ')
          else
            TIMEOUT=0
          fi

          TOTAL=$((CAUGHT + MISSED + TIMEOUT))
          if [ "$TOTAL" -gt 0 ]; then
            SCORE=$((CAUGHT * 100 / TOTAL))
          else
            SCORE=0
          fi

          echo "caught=$CAUGHT" >> $GITHUB_OUTPUT
          echo "missed=$MISSED" >> $GITHUB_OUTPUT
          echo "timeout=$TIMEOUT" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "score=$SCORE" >> $GITHUB_OUTPUT
      - name: Summary
        run: |
          echo "## Mutation Testing Results — ${{ matrix.package }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Mutation testing injects bugs and checks if tests catch them." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mutants caught (good) | ${{ steps.results.outputs.caught }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mutants missed (bad) | ${{ steps.results.outputs.missed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mutants timeout | ${{ steps.results.outputs.timeout }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | ${{ steps.results.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mutation Score** | **${{ steps.results.outputs.score }}%** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "mutants.out/missed.txt" ] && [ -s "mutants.out/missed.txt" ]; then
            echo "### Missed Mutants (need better tests)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -20 mutants.out/missed.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload mutation results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # Per-package name so parallel matrix jobs don't clobber each other.
          name: mutation-results-${{ matrix.package }}
          path: |
            mutants.out/
            mutants-output.txt
          retention-days: 30
      - name: Check mutation score threshold
        run: |
          SCORE="${{ steps.results.outputs.score }}"
          MISSED="${{ steps.results.outputs.missed }}"
          # PR runs require 75% for core/pipeline modules
          # Non-PR runs (scheduled, manual) require 70%
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            THRESHOLD=75
          else
            THRESHOLD=70
          fi

          if [ "$SCORE" -lt "$THRESHOLD" ]; then
            echo "::warning::[${{ matrix.package }}] Mutation score ($SCORE%) is below threshold ($THRESHOLD%)"
            echo "Consider adding more tests for the $MISSED missed mutants."
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo ""
              echo "Core and pipeline modules require a minimum 75% mutation score."
              echo "Please add tests that catch the missed mutants."
              # Don't fail the workflow, just warn
            fi
          else
            echo "[${{ matrix.package }}] Mutation score ($SCORE%) meets threshold ($THRESHOLD%)"
          fi
      # Per-plugin floor enforcement (Phase 3 of #992 plan, closes #1003).
      #
      # The aggregate threshold above is permissive: it can be satisfied
      # by a few well-tested plugins masking many badly-tested ones.
      # The per-plugin script enforces a tighter floor (default ≤10%
      # survival rate) on EACH plugin file under
      # `crates/rustledger-plugin/src/native/plugins/*.rs`. Infrastructure
      # files (registry, runtime, convert, types) are reported but not
      # enforced — they have a different shape from per-plugin code and
      # need their own threshold conversation.
      #
      # GITHUB_ANNOTATIONS=1 surfaces each surviving mutant as an inline
      # `::warning::` annotation on the PR diff, satisfying the
      # "PR inline comments for surviving mutants" criterion of #1003.
      - name: Per-plugin mutation floor check
        if: matrix.package == 'rustledger-plugin'
        env:
          GITHUB_ANNOTATIONS: '1'
          MUTATION_FLOOR: '10'
        run: scripts/per-plugin-mutation-report.sh
