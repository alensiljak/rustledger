# Kani Formal Verification
#
# Uses Kani (https://github.com/model-checking/kani) to prove correctness
# properties of critical Rust code. Kani is a bit-precise model checker
# that can verify properties for all possible inputs.
#
# Runs on:
# - Weekly schedule (expensive)
# - Manual trigger
# - PRs touching core/booking crates (optional, slower CI)
#
name: Kani

on:
  schedule:
    # Weekly on Sunday at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to verify (comma-separated, or "all")'
        required: false
        default: 'rustledger-core'
        type: string
  pull_request:
    paths:
      - 'crates/rustledger-core/src/**'
      - 'crates/rustledger-booking/src/**'
      - '**/kani_proofs.rs'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  kani:
    name: Kani Verification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only run on schedule/dispatch, or on PRs with 'formal-verification' label
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'formal-verification'))
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6

      - name: Install Kani
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          kani-version: 'latest'

      - name: Determine packages to verify
        id: packages
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.packages }}"
            if [ "$INPUT" = "all" ]; then
              echo "packages=rustledger-core,rustledger-booking" >> $GITHUB_OUTPUT
            else
              echo "packages=$INPUT" >> $GITHUB_OUTPUT
            fi
          else
            # Default: just core for scheduled/PR runs
            echo "packages=rustledger-core" >> $GITHUB_OUTPUT
          fi

      - name: Run Kani on rustledger-core
        if: contains(steps.packages.outputs.packages, 'rustledger-core')
        run: |
          echo "::group::Verifying rustledger-core"
          cd crates/rustledger-core
          cargo kani --all-features 2>&1 | tee kani-core-output.txt || true
          echo "::endgroup::"

      - name: Run Kani on rustledger-booking
        if: contains(steps.packages.outputs.packages, 'rustledger-booking')
        run: |
          echo "::group::Verifying rustledger-booking"
          cd crates/rustledger-booking
          cargo kani --all-features 2>&1 | tee kani-booking-output.txt || true
          echo "::endgroup::"

      - name: Summary
        run: |
          echo "## Kani Verification Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Kani is a bit-precise model checker that proves properties hold for all possible inputs." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages Verified" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ steps.packages.outputs.packages }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract verification results
          for output in crates/*/kani-*-output.txt; do
            if [ -f "$output" ]; then
              echo "### $(basename $(dirname $output))" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -E "(VERIFICATION|Checking harness|SUCCESS|FAILURE)" "$output" | tail -20 >> $GITHUB_STEP_SUMMARY || echo "No results found" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload Kani output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: kani-results
          path: crates/*/kani-*-output.txt
          retention-days: 7
          if-no-files-found: ignore
