# Security scanning workflow - Secret detection
#
# Note: Other security checks are handled by:
# - ci.yml: cargo-deny (advisories, licenses, bans)
# - supply-chain.yml: cargo-vet, dependency-review, SBOM generation
#
# This workflow focuses on secret scanning only.
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # Secret scanning with gitleaks
  # Skips for Dependabot PRs (no access to GITLEAKS_LICENSE secret)
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    # Skip for Dependabot - it only updates dependencies, not code with secrets
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          fetch-depth: 0  # Full history for scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml
