# Security scanning workflow - Secret detection
#
# Note: Other security checks are handled by:
# - ci.yml: cargo-deny (advisories, licenses, bans)
# - supply-chain.yml: cargo-vet, dependency-review, SBOM generation
#
# This workflow focuses on secret scanning only.
name: Security
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
jobs:
  # Secret scanning with gitleaks
  # Skips for Dependabot PRs (no access to GITLEAKS_LICENSE secret)
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    # Skip for Dependabot - it only updates dependencies, not code with secrets
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
        with:
          fetch-depth: 0 # Full history for scanning
      - name: Run Gitleaks (standalone binary)
        run: |
          version=8.21.2
          checksum=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba

          # Download and verify
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz -o gitleaks.tar.gz
          echo "${checksum}  gitleaks.tar.gz" | sha256sum -c - || exit 1

          # Extract binary only (avoid clobbering LICENSE/README.md)
          tar -xzf gitleaks.tar.gz gitleaks

          # Run scan
          ./gitleaks detect --config .gitleaks.toml --source . --verbose --redact
