# Release-plz Workflow
# ====================
# Automates releases using conventional commits:
# - Creates release PRs with changelog updates
# - Syncs npm package versions
# - Creates git tags and GitHub releases
#
# Flow:
# 1. On push to main: Creates/updates a release PR
# 2. On PR merge: Creates git tag and GitHub release
# 3. Tag triggers release-build.yml and release-publish.yml
#
name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug_semver:
        description: 'Enable verbose semver check debugging'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    # Don't run in forks
    if: github.repository == 'rustledger/rustledger'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      # Debug: Run cargo-semver-checks directly to diagnose issues
      - name: Debug - Run cargo-semver-checks directly
        if: inputs.debug_semver == true
        run: |
          echo "=== Installing cargo-semver-checks ==="
          cd /tmp
          curl -sL https://github.com/obi1kenobi/cargo-semver-checks/releases/download/v0.45.0/cargo-semver-checks-x86_64-unknown-linux-musl.tar.gz | tar xzf -
          chmod +x cargo-semver-checks
          ./cargo-semver-checks --version
          cd -

          echo ""
          echo "=== Running cargo-semver-checks on rustledger-parser ==="
          /tmp/cargo-semver-checks semver-checks check-release \
            --manifest-path crates/rustledger-parser/Cargo.toml \
            --verbose \
            2>&1 || echo "Exit code: $?"

      # Use app token to create PR so it triggers CI workflows automatically
      # (GITHUB_TOKEN can't trigger other workflows)
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@99b33d83e322fcd1b1fa126f8c4a74744aae3c8d # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          RUST_LOG: ${{ inputs.debug_semver == true && 'release_plz_core::semver_check=debug,release_plz_core=info' || '' }}

      # Clean up old release-plz branches (from closed/superseded PRs)
      - name: Cleanup old release-plz branches
        if: steps.release-plz.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DATA: ${{ steps.release-plz.outputs.pr }}
        run: |
          CURRENT_BRANCH=$(echo "$PR_DATA" | jq -r '.head_branch // empty' 2>/dev/null || echo "")
          echo "Current release branch: $CURRENT_BRANCH"

          # Safety check: don't proceed if we couldn't determine the current branch
          if [ -z "$CURRENT_BRANCH" ]; then
            echo "Could not determine current release branch; skipping cleanup"
            exit 0
          fi

          # Find and delete old release-plz branches (with validation)
          git ls-remote --heads origin 'release-plz-*' \
            | awk -F'/' '{print $NF}' \
            | grep -E '^release-plz-[0-9T-]+Z$' \
            | while IFS= read -r branch; do
                if [ "$branch" != "$CURRENT_BRANCH" ]; then
                  echo "Deleting old branch: $branch"
                  git push origin --delete "$branch" || echo "Failed to delete $branch (may already be deleted)"
                fi
              done

      # Enable auto-merge for release PRs (will merge when checks pass and approved)
      - name: Enable auto-merge for release PR
        if: steps.release-plz.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DATA: ${{ steps.release-plz.outputs.pr }}
        run: |
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number // empty' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            echo "Enabling auto-merge for PR #$PR_NUMBER"
            gh pr merge "$PR_NUMBER" --auto --merge || echo "Auto-merge setup failed (may need approval, branch protection, or permissions)"
          else
            echo "Could not extract PR number from output"
          fi

      # Sync all package versions to the release PR branch (not main!)
      # This ensures the version sync is included when the PR merges
      - name: Sync package versions (npm, rpm)
        # Only run when a PR was actually created/updated (not empty object {})
        if: steps.release-plz.outputs.pr != '' && steps.release-plz.outputs.pr != '{}'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_DATA: ${{ steps.release-plz.outputs.pr }}
        run: |
          # Extract the PR branch name from release-plz output
          PR_BRANCH=$(echo "$PR_DATA" | jq -r '.head_branch // empty' 2>/dev/null || echo "")
          if [ -z "$PR_BRANCH" ]; then
            echo "::error::Could not extract PR branch from release-plz output"
            exit 1
          fi
          echo "Release PR branch: $PR_BRANCH"

          # Checkout the release PR branch
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"

          # Get the version from the workspace Cargo.toml [workspace.package] section
          VERSION=$(grep -A5 '^\[workspace\.package\]' Cargo.toml | grep '^version' | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ -z "$VERSION" ]; then
            # Fallback to root package version
            VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version from Cargo.toml"
            exit 1
          fi
          echo "Syncing npm packages to version $VERSION"

          # Update MCP server package.json using jq for safer JSON manipulation
          if [ -f "packages/mcp-server/package.json" ]; then
            jq --arg ver "$VERSION" '.version = $ver | .dependencies["@rustledger/wasm"] = "^\($ver)"' \
              packages/mcp-server/package.json > packages/mcp-server/package.json.tmp
            mv packages/mcp-server/package.json.tmp packages/mcp-server/package.json
            echo "Updated packages/mcp-server/package.json to version $VERSION"
          fi

          # Update RPM spec file
          if [ -f "packaging/rpm/rustledger.spec" ]; then
            # Update Version field
            sed -i "s/^Version:.*$/Version:        $VERSION/" packaging/rpm/rustledger.spec
            # Update Source0 URL
            sed -i "s|/v[0-9.]*\.tar\.gz|/v$VERSION.tar.gz|" packaging/rpm/rustledger.spec
            # Update %setup directory name
            sed -i "s/rustledger-[0-9.]*/rustledger-$VERSION/" packaging/rpm/rustledger.spec
            echo "Updated packaging/rpm/rustledger.spec to version $VERSION"
          fi

          # Check if there are changes to commit
          if git diff --quiet packages/ packaging/; then
            echo "No package version changes needed"
          else
            # Use GitHub API to create commits (signed by GitHub)
            # This is required because branch protection requires signed commits
            REPO="${{ github.repository }}"
            COMMIT_MSG="chore: sync package versions to $VERSION"

            # Get the current commit SHA of the PR branch
            CURRENT_SHA=$(gh api "repos/$REPO/git/refs/heads/$PR_BRANCH" --jq '.object.sha')
            echo "Current commit: $CURRENT_SHA"

            # Get the tree SHA from the current commit
            BASE_TREE=$(gh api "repos/$REPO/git/commits/$CURRENT_SHA" --jq '.tree.sha')
            echo "Base tree: $BASE_TREE"

            # Create blobs for modified files and build tree entries
            TREE_ENTRIES="[]"

            for file in packages/mcp-server/package.json packaging/rpm/rustledger.spec; do
              if [ -f "$file" ]; then
                CONTENT=$(base64 -w 0 "$file")
                BLOB_SHA=$(gh api "repos/$REPO/git/blobs" \
                  -f encoding=base64 \
                  -f content="$CONTENT" \
                  --jq '.sha')
                echo "Created blob for $file: $BLOB_SHA"
                TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq --arg path "$file" --arg sha "$BLOB_SHA" \
                  '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]')
              fi
            done

            # Create new tree
            NEW_TREE=$(jq -n --argjson tree "$TREE_ENTRIES" --arg base "$BASE_TREE" \
              '{tree: $tree, base_tree: $base}' | \
              gh api "repos/$REPO/git/trees" --input - --jq '.sha')
            echo "New tree: $NEW_TREE"

            # Create commit (GitHub will sign this)
            NEW_COMMIT=$(gh api "repos/$REPO/git/commits" \
              -f message="$COMMIT_MSG" \
              -f tree="$NEW_TREE" \
              -f "parents[]=$CURRENT_SHA" \
              --jq '.sha')
            echo "New commit: $NEW_COMMIT"

            # Update branch reference
            gh api "repos/$REPO/git/refs/heads/$PR_BRANCH" \
              -X PATCH \
              -f sha="$NEW_COMMIT" \
              -F force=false

            echo "Package versions synced to PR branch (signed via GitHub API)"
          fi

  # Create release when PR is merged
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: release-plz
    # Only run if this is a merge of a release-plz PR
    # Merge commit message contains branch name: "Merge pull request #N from rustledger/release-plz-..."
    if: |
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, 'release-plz-')
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      # Use GitHub App token (not GITHUB_TOKEN) so tag creation triggers release-build.yml
      # GITHUB_TOKEN events don't trigger other workflows (GitHub security feature)
      - name: Run release-plz release
        uses: release-plz/action@99b33d83e322fcd1b1fa126f8c4a74744aae3c8d # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
