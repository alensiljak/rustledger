# Quality checks - API compatibility, MSRV, security, coverage
name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Semver check - detect breaking API changes
  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    # Only run on PRs to catch breaking changes before merge
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - name: Check for Rust changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
      - name: Check semver compatibility
        if: steps.changes.outputs.rust == 'true'
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
        with:
          feature-group: all-features
          # Exclude CLI crate (internal API changes are fine) and non-library crates
          exclude: rustledger,rustledger-lsp,rustledger-wasm
          rust-toolchain: stable
      - name: Skip semver check
        if: steps.changes.outputs.rust != 'true'
        run: echo "No Rust changes detected, skipping semver check"

  # MSRV check - verify minimum supported Rust version
  msrv:
    name: MSRV (1.90)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: "1.90"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Check MSRV compatibility
        run: cargo check --workspace --all-features

  # Security and license audit
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: taiki-e/install-action@0fc09cf1c2f18a9f700d18b3d6eb8f7ee877c7a2 # cargo-deny
      - name: Check advisories, licenses, and bans
        run: cargo deny check

  # Code coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      RUST_MIN_STACK: 8388608
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@fb03c6692ef8fff8e8e84e2aa701f168d7ed3811 # cargo-llvm-cov
      - name: Generate coverage report
        run: |
          cargo llvm-cov --all-features --lcov --output-path lcov.info \
            --package rustledger-core \
            --package rustledger-parser \
            --package rustledger-booking \
            --package rustledger-loader \
            --package rustledger-validate \
            --package rustledger-query \
            --package rustledger-plugin \
            --package rustledger-importer
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Gate job - all quality checks must pass
  quality:
    name: quality
    if: always()
    needs: [semver, msrv, deny, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Check all quality jobs
        run: |
          result="${{ (contains(needs.*.result, 'failure') && 'failure') || (contains(needs.*.result, 'cancelled') && 'cancelled') || 'success' }}"
          echo "Quality gate result: $result"
          [[ "$result" == "success" ]] || exit 1
