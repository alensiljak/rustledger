# Core CI workflow - runs on every PR
# Fast checks: format, build, lint, test, docs, regressions
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  # Fast format check
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Main CI matrix - check, clippy, test, doc
  ci:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      RUST_MIN_STACK: 8388608
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Check
            cmd: cargo check --all-features --all-targets
            components: ""
          - name: Clippy
            cmd: cargo clippy --all-features --all-targets -- -D warnings
            components: clippy
          - name: Test
            cmd: cargo nextest run --all-features
            components: ""
            install: nextest
          - name: Documentation
            cmd: cargo doc --all-features --no-deps
            components: ""
            env: RUSTDOCFLAGS=-Dwarnings
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: ${{ matrix.components }}
      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Install nextest
        if: matrix.install == 'nextest'
        uses: taiki-e/install-action@735e5933943122c5ac182670a935f54a949265c1 # v2
        with:
          tool: cargo-nextest
        continue-on-error: true
        id: install-nextest
      - name: Install nextest (fallback)
        if: matrix.install == 'nextest' && steps.install-nextest.outcome == 'failure'
        run: cargo install cargo-nextest --locked
      - name: ${{ matrix.name }}
        run: ${{ matrix.cmd }}
        env:
          RUSTDOCFLAGS: ${{ matrix.env == 'RUSTDOCFLAGS=-Dwarnings' && '-Dwarnings' || '' }}

  # Doctests (nextest doesn't support them)
  doctest:
    name: Doctests
    runs-on: ubuntu-latest
    env:
      RUST_MIN_STACK: 8388608
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Run doctests
        run: cargo test --doc --all-features

  # Regression tests - user-reported issues
  regressions:
    name: Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Build rledger
        run: cargo build --release --bin rledger
      - name: Run regression tests
        run: ./scripts/test-regressions.sh ./target/release/rledger
      - name: Summary
        run: |
          echo "## Regression Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tested beancount files from user-reported issues:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in tests/regressions/issue-*.beancount; do
            issue=$(basename "$f" .beancount | sed 's/issue-//')
            echo "- [#$issue](https://github.com/rustledger/rustledger/issues/$issue)" >> $GITHUB_STEP_SUMMARY
          done

  # Gate job - all core checks must pass
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [fmt, ci, doctest, regressions]
    steps:
      - run: echo "All core checks passed!"
