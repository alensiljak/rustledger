# Core CI workflow - runs on every PR
# Fast checks: format, build, lint, test, docs, regressions
#
# Optimization: Skips expensive builds on non-code PRs (docs, CI config, etc.)
# Always runs full build on: release PRs, pushes to main, merge queue
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
jobs:
  # Detect if code files changed (skip builds on docs-only PRs)
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Check for code changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'tests/**'
              - 'spec/**'
              # PR #1228 review flagged this gap: a PR that changes only
              # `scripts/regen-bindings.sh` or the checked-in bindings
              # files used to skip the `bindings-fresh` job. Include
              # them so script-only changes still run the freshness
              # check.
              - 'scripts/regen-bindings.sh'
              - 'crates/rustledger-wasm/bindings/**'
      - name: Decide if build needed
        id: decide
        env:
          CODE_CHANGED: ${{ steps.filter.outputs.code }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Always build on push to main, merge queue, or manual dispatch
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "Non-PR event ($EVENT_NAME) - will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Always build on release PRs
          if [[ "$HEAD_REF" == release/* ]]; then
            echo "Release PR detected - will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Build if code changed
          if [[ "$CODE_CHANGED" == "true" ]]; then
            echo "Code changes detected - will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "No code changes - skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
  # Fast format check (only on code changes)
  fmt:
    name: Format
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check
  # Release hygiene: the crates.io publish list in release-publish.yml must
  # match the set of publishable workspace crates. A new crate missing from
  # the array silently breaks `cargo publish` for its dependents mid-release
  # (this is what broke v0.16.0 — rustledger-completion was never added).
  publish-list:
    name: Publish list in sync
    runs-on: ubuntu-latest
    # Only runs `cargo metadata` (no compilation), so disable the workflow-level
    # sccache wrapper — it isn't installed here, and rustc's version probe would
    # otherwise fail with "could not execute process sccache".
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      - name: Verify release-publish CRATES array matches publishable crates
        run: python3 scripts/check-publish-crates.py
  # Wire-format bindings freshness gate (ADR-0004, #1218 + #1232).
  # Regenerates all three artifacts from the Rust DTOs and fails if any
  # differs from the checked-in version:
  #   - crates/rustledger-wasm/bindings/index.d.ts     (TS, ts-rs)
  #   - crates/rustledger-wasm/bindings/index.schema.json (JSON Schema, schemars)
  #   - crates/rustledger-wasm/bindings/types.py       (Python, datamodel-code-generator)
  # Any wire-format field change must come with all three regenerated
  # in the same PR.
  bindings-fresh:
    name: Wire-format bindings freshness
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      # Node for the prettier pass in `scripts/regen-bindings.sh`
      # (#1226). Read from `.nvmrc` to keep the version in one place --
      # matches the convention in `wasm.yml` (single source of truth).
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
      # Python for the `datamodel-code-generator` invocation that
      # emits `bindings/types.py` (Phase 3, #1232). ubuntu-latest
      # preinstalls `pipx`, so the script's `pipx run` path picks the
      # tool up without an extra `pip install` step. Pinning Python
      # 3.12 (matches `--target-python-version` in the regen script).
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      # sccache is set as RUSTC_WRAPPER at the workflow level (line 21),
      # so every job that compiles Rust must install the action -- without
      # it, cargo's `-vV` probe fails with "could not execute process
      # sccache" (E2 / ENOENT).
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: bindings
      - name: Regenerate + diff bindings (TS, JSON Schema, Python)
        run: RUSTLEDGER_TS_CHECK=1 scripts/regen-bindings.sh
  # Fast invariant check: verify that crates declaring
  # `#![forbid(unsafe_code)]` contain no `unsafe` blocks/items. Runs in
  # milliseconds via grep, so it fails loudly and early on AI-generated
  # PRs that try to add unsafe to a forbidding crate (see PR #769 for
  # the proximate trigger).
  #
  # `cargo check` also enforces this invariant, but its failure message
  # reads `"usage of an unsafe block"` without mentioning the forbid
  # directive the author is violating. This script prints both the
  # offending line and the forbid directive line in the same error, as
  # a named CI status, so reviewers don't have to hunt for context.
  unsafe-invariant:
    name: Unsafe Invariant
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Verify forbid-unsafe-code invariant
        run: ./scripts/check-unsafe-invariant.sh

  # Ratchet for the parking_lot adoption (#1076): forbid std::sync Mutex/RwLock
  # in library code so the perf decision can't silently regress. Same
  # lightweight named-status pattern as the unsafe invariant; no extra
  # toolchain required (deliberately a grep ratchet rather than a dylint lint).
  sync-primitives:
    name: Sync Primitives
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Forbid std::sync Mutex/RwLock in library code
        run: ./scripts/check-sync-primitives.sh

  # Plugin-test policies (Phase 5 of plugin-testing-quality plan, see #992).
  # Catches weak count assertions and `(partial)` test ports that tend to
  # silently mask plugin bugs.
  #
  # Always runs (no `should_build` gate), because the policy script and
  # CONTRIBUTING.md changes themselves can land in docs-only PRs and we
  # still want to lint the test files against the current policy.
  plugin-test-quality:
    name: Plugin Test Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Self-test the lint script (catches regressions in the regexes)
        run: ./scripts/test-plugin-test-quality.sh
      - name: Run plugin-test-quality lints
        run: ./scripts/check-plugin-test-quality.sh
      - name: Self-test the per-plugin mutation report script
        run: ./scripts/test-per-plugin-mutation-report.sh

  # Ratchet for the FxHasher adoption on hot paths (#1076): modules marked
  # `// ratchet: fxhash-only` must not use std SipHash HashMap/HashSet, which
  # would silently regress the perf decision. Grep ratchet, no extra toolchain
  # (#1237). Same lightweight named-status pattern as the unsafe invariant.
  hot-path-collections:
    name: Hot-path Collections
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Forbid std SipHash collections in fxhash-only modules
        run: ./scripts/check-hot-path-collections.sh

  # Public-API SemVer ratchet for the plugin DTOs (#1233, Tier 1).
  # `rustledger-plugin-types` is what every plugin author compiles against —
  # an accidental breaking change (a renamed pub field, a changed trait
  # signature, a pub enum variant added without `#[non_exhaustive]`) would
  # ship in the published crate and break every plugin. cargo-semver-checks
  # compares the current public API against the last crates.io release (the
  # crate is published by release-publish.yml) and fails on an unmarked
  # SemVer-major break. The action manages the nightly toolchain rustdoc
  # JSON needs, so no nightly is added to the flake.
  #
  # ADVISORY for now: this job is deliberately NOT part of the `build` merge
  # gate, so it surfaces breaks without blocking. Promote it to required
  # (add to the `build` aggregator or branch protection) once it has proven
  # stable on real PRs. Tier 1 = plugin-types only; expand to core/parser
  # later.
  #
  # Runs on EVERY PR (no `should_build` gate): the semver check must always
  # report so it (a) self-validates on workflow-only PRs and (b) can be
  # promoted to a required check later without a skipped run blocking
  # config-only PRs forever (a skipped required check never goes green).
  #
  # Env overrides: RUSTC_WRAPPER is cleared because the workflow sets it to
  # sccache globally (line ~21) and this job does not install the
  # sccache-action; RUSTFLAGS is cleared so nightly-rustdoc warning churn
  # can't red the ratchet for reasons unrelated to a SemVer break.
  semver-plugin-types:
    name: SemVer (plugin-types)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ''
      RUSTFLAGS: ''
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Check rustledger-plugin-types public API for SemVer breaks
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
        with:
          package: rustledger-plugin-types

  # Main CI matrix - check, clippy, test, doc (only on code changes)
  ci:
    name: ${{ matrix.name }}
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      RUST_MIN_STACK: 8388608
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Check
            cmd: cargo check --all-features --all-targets
            components: ""
          - name: Clippy
            cmd: cargo clippy --all-features --all-targets -- -D warnings
            components: clippy
          - name: Test
            cmd: cargo nextest run --all-features
            components: ""
            install: nextest
          - name: Documentation
            cmd: cargo doc --all-features --no-deps
            components: ""
            env: RUSTDOCFLAGS=-Dwarnings
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: ${{ matrix.components }}
          # wasm32 needed by rustledger-importer's build.rs (which
          # compiles the sample_stub fixture for the wasm_importer_e2e
          # test). Without it, build.rs gracefully skips and the e2e
          # test silently passes without doing anything — see PR #1135
          # commit history.
          targets: wasm32-unknown-unknown
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Install nextest
        if: matrix.install == 'nextest'
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2.79.0
        with:
          tool: cargo-nextest
        continue-on-error: true
        id: install-nextest
      - name: Install nextest (fallback)
        if: matrix.install == 'nextest' && steps.install-nextest.outcome == 'failure'
        run: cargo install cargo-nextest --locked
      - name: ${{ matrix.name }}
        run: ${{ matrix.cmd }}
        env:
          RUSTDOCFLAGS: ${{ matrix.env == 'RUSTDOCFLAGS=-Dwarnings' && '-Dwarnings' || '' }}
  # Doctests (nextest doesn't support them, only on code changes)
  doctest:
    name: Doctests
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      RUST_MIN_STACK: 8388608
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Run doctests
        run: cargo test --doc --all-features
  # Regression tests - user-reported issues (only on code changes)
  regressions:
    name: Regression Tests
    needs: [changes]
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Build rledger
        run: cargo build --release --bin rledger
      - name: Run regression tests
        run: ./scripts/test-regressions.sh ./target/release/rledger
      - name: Summary
        run: |
          echo "## Regression Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tested beancount files from user-reported issues:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in tests/regressions/issue-*.beancount; do
            issue=$(basename "$f" .beancount | sed 's/issue-//')
            echo "- [#$issue](https://github.com/rustledger/rustledger/issues/$issue)" >> $GITHUB_STEP_SUMMARY
          done
  # Gate job - all core checks must pass (or be skipped on non-code PRs)
  build:
    name: build
    if: always()
    runs-on: ubuntu-latest
    needs: [changes, fmt, unsafe-invariant, sync-primitives, hot-path-collections, plugin-test-quality, ci, doctest, regressions, bindings-fresh]
    steps:
      - name: Check results
        run: |
          # plugin-test-quality always runs (no should_build gate), so its
          # result is always required.
          plugin_quality="${{ needs.plugin-test-quality.result }}"
          echo "plugin-test-quality result: $plugin_quality"
          if [[ "$plugin_quality" != "success" ]]; then
            echo "plugin-test-quality must pass"
            exit 1
          fi

          # If no code changes, the remaining build jobs are skipped - that's OK
          if [[ "${{ needs.changes.outputs.should_build }}" == "false" ]]; then
            echo "No code changes - build skipped (OK)"
            exit 0
          fi

          # Otherwise, check that all jobs passed. bindings-fresh is
          # part of the gate (ADR-0004 Phase 3 / #1232): wire-format
          # drift in the generated TS / JSON Schema / Python artifacts
          # blocks merge just like any other failure.
          results="${{ needs.fmt.result }} ${{ needs.unsafe-invariant.result }} ${{ needs.sync-primitives.result }} ${{ needs.hot-path-collections.result }} ${{ needs.ci.result }} ${{ needs.doctest.result }} ${{ needs.regressions.result }} ${{ needs.bindings-fresh.result }}"
          echo "Job results: $results"

          if echo "$results" | grep -qE '(failure|cancelled)'; then
            echo "Some jobs failed or were cancelled"
            exit 1
          fi

          echo "All core checks passed!"
