name: Docs Validation

on:
  pull_request:
    paths:
      - 'docs/**'
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: docs-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout rustledger (with docs)
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          path: rustledger
          sparse-checkout: docs

      - name: Checkout website repo (for VitePress config)
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          repository: rustledger/rustledger.github.io
          path: website
          sparse-checkout: |
            docs/.vitepress
            package.json
            bun.lock

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('website/bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Sync docs from PR to website
        run: |
          # Use rsync to properly sync docs, deleting files that don't exist in PR
          # This catches dead links to files that were removed
          rsync -av --delete \
            --exclude='.vitepress' \
            rustledger/docs/ website/docs/

      - name: Build docs with VitePress
        working-directory: website
        run: bun run docs:build
