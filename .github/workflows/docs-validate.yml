name: Docs Validation
on:
  pull_request:
    paths:
      - 'docs/**'
  push:
    branches: [main]
    paths:
      - 'docs/**'
permissions:
  contents: read
concurrency:
  group: docs-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  validate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout rustledger (with docs)
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
        with:
          path: rustledger
          sparse-checkout: docs
      - name: Checkout website repo (for VitePress config)
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
        with:
          repository: rustledger/rustledger.github.io
          path: website
          sparse-checkout: |
            docs/.vitepress
            package.json
            package-lock.json
      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: website
        run: npm ci
      - name: Sync docs from PR to website
        run: |
          # Use rsync to properly sync docs, deleting files that don't exist in PR
          # This catches dead links to files that were removed
          rsync -av --delete \
            --exclude='.vitepress' \
            rustledger/docs/ website/docs/
      - name: Build docs with VitePress
        working-directory: website
        run: npx vitepress build docs
