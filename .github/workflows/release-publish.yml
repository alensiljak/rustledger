# Release Publish Workflow
# ========================
# Triggered when a GitHub Release is published, or manually via workflow_dispatch.
# Distributes the release to all package managers and registries.
#
# This workflow is separate from release-build.yml so that if distribution fails,
# you can re-run just this workflow without rebuilding all binaries.
#
# DISTRIBUTION CHANNELS
# ---------------------
# | Channel      | Repo/Registry                          |
# |--------------|----------------------------------------|
# | crates.io    | crates.io (all workspace crates)       |
# | npm (wasm)   | @rustledger/wasm                       |
# | npm (mcp)    | @rustledger/mcp-server                 |
# | Docker       | ghcr.io/rustledger/rustledger          |
# | Homebrew     | homebrew-core (official)               |
# | Scoop        | rustledger/scoop-rustledger            |
# | COPR         | copr.fedorainfracloud.org/rustledger   |
# | AUR          | aur.archlinux.org (rustledger*)        |
# | Rustfava     | rustledger/rustfava (WASM update)      |
#
# SECRETS REQUIRED
# ----------------
# - BOT_APP_ID / BOT_PRIVATE_KEY: GitHub App for cross-repo dispatches (Scoop, website)
# - HOMEBREW_GITHUB_API_TOKEN: PAT with public_repo scope for homebrew-core PRs
# - COPR_LOGIN / COPR_TOKEN: COPR build trigger
# - AUR_SSH_PRIVATE_KEY: SSH key for pushing to AUR (aur.archlinux.org)
# - (crates.io and npm use OIDC trusted publishing, no tokens needed)
#
name: Release Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.1.0)'
        required: true
        type: string
permissions:
  contents: read
  id-token: write # Required for trusted publishing (OIDC) - npm and crates.io
  packages: write # Required for GitHub Container Registry
env:
  CARGO_TERM_COLOR: always
  # Use input tag for workflow_dispatch, otherwise use the release tag
  RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
jobs:
  # Publish Rust crates to crates.io
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - name: Authenticate with crates.io (trusted publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1
      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          # Publish each crate individually with error handling.
          # This allows re-running the workflow if some crates failed,
          # since already-published crates will be skipped gracefully.
          #
          # IMPORTANT: Order matters! Dependencies must be published before dependents.
          # To determine the correct order, run: cargo metadata --format-version=1 | jq -r '.packages[].name'
          # and arrange so that each crate's dependencies appear before it.
          # Current dependency tree (simplified):
          #   core -> parser -> booking -> plugin -> validate -> loader -> query -> importer -> rustledger
          #   wasm and ffi-wasi depend on most crates; lsp depends on query
          CRATES=(
            rustledger-core
            rustledger-parser
            rustledger-booking
            rustledger-plugin
            rustledger-validate
            rustledger-loader
            rustledger-query
            rustledger-importer
            rustledger
            rustledger-wasm
            rustledger-ffi-wasi
            rustledger-lsp
          )

          FAILED=()
          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing $crate"
            if cargo publish -p "$crate" --no-verify 2>&1 | tee /tmp/publish.log; then
              echo "✓ $crate published successfully"
              # Wait for crates.io to index the crate before publishing dependents
              echo "Waiting 30s for crates.io indexing..."
              sleep 30
            elif grep -q "already been uploaded" /tmp/publish.log; then
              echo "✓ $crate already published (skipping)"
            elif grep -q "Trusted Publishing tokens do not support creating new crates" /tmp/publish.log; then
              echo "⚠ $crate is a new crate - must be published manually first"
              echo "::warning::$crate requires manual first publish: cargo publish -p $crate"
            else
              echo "✗ Failed to publish $crate"
              cat /tmp/publish.log
              FAILED+=("$crate")
            fi
            echo "::endgroup::"
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed to publish: ${FAILED[*]}"
            exit 1
          fi

          echo "All crates published successfully!"

  # Publish WASM package to npm
  publish-npm-wasm:
    name: Publish to npm (@rustledger/wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM package
        run: |
          cd crates/rustledger-wasm
          wasm-pack build --target web --release
      - name: Prepare package
        run: |
          VERSION=${RELEASE_TAG#v}
          cd crates/rustledger-wasm/pkg
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json
          sed -i 's/"name": "rustledger-wasm"/"name": "@rustledger\/wasm"/' package.json
      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Update npm for OIDC support
        run: npm install -g npm@latest
      - name: Publish to npm (trusted publishing)
        run: |
          cd crates/rustledger-wasm/pkg
          npm publish --access public --provenance || true

  # Trigger website rebuild to use new WASM package
  trigger-website:
    name: Trigger website rebuild
    needs: publish-npm-wasm
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: rustledger
          repositories: rustledger.github.io

      - name: Trigger website rebuild
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: rustledger/rustledger.github.io
          event-type: wasm-release

  # Publish MCP server to npm
  publish-npm-mcp:
    name: Publish MCP server to npm
    needs: publish-npm-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Update npm for OIDC support
        run: npm install -g npm@latest
      - name: Wait for npm registry propagation
        run: |
          VERSION=${RELEASE_TAG#v}
          echo "Waiting for @rustledger/wasm@$VERSION to be available on npm..."
          for i in {1..12}; do
            if npm view @rustledger/wasm@$VERSION version 2>/dev/null; then
              echo "Package available!"
              exit 0
            fi
            echo "Attempt $i: Package not yet available, waiting 30s..."
            sleep 30
          done
          echo "Package not available after 6 minutes"
          exit 1
      - name: Install dependencies
        run: |
          cd packages/mcp-server
          npm install
      - name: Build
        run: |
          cd packages/mcp-server
          npm run build
      - name: Publish to npm (trusted publishing)
        run: |
          cd packages/mcp-server
          npm publish --access public --provenance || true

  # Build and push Docker images
  publish-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Download musl binaries from release
        run: |
          VERSION=$RELEASE_TAG
          mkdir -p artifacts
          # Download musl binaries from GitHub Release
          curl -sL "https://github.com/rustledger/rustledger/releases/download/${VERSION}/rustledger-${VERSION}-x86_64-unknown-linux-musl.tar.gz" -o "artifacts/rustledger-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -sL "https://github.com/rustledger/rustledger/releases/download/${VERSION}/rustledger-${VERSION}-aarch64-unknown-linux-musl.tar.gz" -o "artifacts/rustledger-${VERSION}-aarch64-unknown-linux-musl.tar.gz"
      - name: Extract binaries
        run: |
          VERSION=$RELEASE_TAG
          mkdir -p docker-context/amd64 docker-context/arm64
          tar -xzf "artifacts/rustledger-${VERSION}-x86_64-unknown-linux-musl.tar.gz" -C docker-context/amd64
          tar -xzf "artifacts/rustledger-${VERSION}-aarch64-unknown-linux-musl.tar.gz" -C docker-context/arm64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Dockerfile
        run: |
          cat > docker-context/Dockerfile << 'EOF'
          FROM scratch
          ARG TARGETARCH
          COPY ${TARGETARCH}/* /usr/local/bin/
          ENTRYPOINT ["rledger"]
          EOF
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/rustledger/rustledger
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref_name }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker-context
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Submit PR to homebrew-core
  update-homebrew:
    name: Bump Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - name: Bump rustledger formula in homebrew-core
        uses: dawidd6/action-homebrew-bump-formula@1446dca236b0440c6f02723a3f14f13be2c04ab0 # v7
        with:
          token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          formula: rustledger
          tag: ${{ env.RELEASE_TAG }}
          # Don't fail the workflow if homebrew-core PR fails (e.g., already exists)
        continue-on-error: true

  # Update Scoop bucket
  update-scoop:
    name: Update Scoop bucket
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: rustledger
          repositories: scoop-rustledger

      - name: Trigger Scoop bucket update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: rustledger/scoop-rustledger
          event-type: release
          client-payload: '{"version": "${{ env.RELEASE_TAG }}"}'

  # Trigger COPR build (Fedora/RHEL)
  update-copr:
    name: Trigger COPR build
    runs-on: ubuntu-latest
    steps:
      - name: Install copr-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install copr-cli
      - name: Configure COPR
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr << 'EOF'
          [copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = robcohen
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF
      - name: Trigger SCM build
        run: |
          # Trigger a build using COPR's SCM integration
          # The project is configured to fetch from GitHub and use packaging/rpm/rustledger.spec
          copr-cli build-package robcohen/rustledger \
            --name rustledger \
            --nowait || true

  # Trigger Rustfava WASM update
  update-rustfava:
    name: Update Rustfava WASM version
    needs: [publish-npm-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: rustledger
          repositories: rustfava

      - name: Trigger Rustfava WASM update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: rustledger/rustfava
          event-type: rustledger-release
          client-payload: '{"version": "${{ env.RELEASE_TAG }}"}'

  # Update AUR packages (Arch Linux)
  # Uses KSXGitHub/github-actions-deploy-aur which properly handles:
  # - Non-root user creation (makepkg refuses to run as root)
  # - SSH key setup and host key scanning
  # - .SRCINFO generation via makepkg --printsrcinfo
  update-aur-source:
    name: Update AUR (rustledger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Prepare PKGBUILD
        run: |
          VERSION=${RELEASE_TAG#v}
          SOURCE_SHA256=$(curl -fsSL "https://github.com/rustledger/rustledger/archive/refs/tags/${RELEASE_TAG}.tar.gz" | sha256sum | cut -d' ' -f1)

          # Validate checksum (should be 64 hex chars)
          if ! echo "$SOURCE_SHA256" | grep -qE '^[a-f0-9]{64}$'; then
            echo "::error::Invalid source checksum: $SOURCE_SHA256"
            exit 1
          fi

          # Update PKGBUILD with new version and checksum
          # Must be in workspace for Docker-based action to access it
          cp packaging/arch/rustledger/PKGBUILD ./PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" ./PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" ./PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SOURCE_SHA256}')/" ./PKGBUILD

          echo "Generated PKGBUILD:"
          cat ./PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@2ac5a4c1d7035885d46b10e3193393be8460b6f1 # v4.1.1
        with:
          pkgname: rustledger
          pkgbuild: ./PKGBUILD
          commit_username: rustledger-bot
          commit_email: bot@rustledger.dev
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.RELEASE_TAG }}"

  update-aur-bin:
    name: Update AUR (rustledger-bin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Prepare PKGBUILD
        run: |
          VERSION=${RELEASE_TAG#v}
          X86_64_SHA256=$(curl -fsSL "https://github.com/rustledger/rustledger/releases/download/${RELEASE_TAG}/rustledger-${RELEASE_TAG}-x86_64-unknown-linux-gnu.tar.gz.sha256" | cut -d' ' -f1)
          AARCH64_SHA256=$(curl -fsSL "https://github.com/rustledger/rustledger/releases/download/${RELEASE_TAG}/rustledger-${RELEASE_TAG}-aarch64-unknown-linux-gnu.tar.gz.sha256" | cut -d' ' -f1)

          # Validate checksums (should be 64 hex chars)
          for name in X86_64 AARCH64; do
            val=$(eval echo "\$${name}_SHA256")
            if ! echo "$val" | grep -qE '^[a-f0-9]{64}$'; then
              echo "::error::Invalid ${name} checksum: $val"
              exit 1
            fi
          done

          # Update PKGBUILD with new version and checksums
          # Must be in workspace for Docker-based action to access it
          cp packaging/arch/rustledger-bin/PKGBUILD ./PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" ./PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" ./PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${X86_64_SHA256}')/" ./PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${AARCH64_SHA256}')/" ./PKGBUILD

          echo "Generated PKGBUILD:"
          cat ./PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@2ac5a4c1d7035885d46b10e3193393be8460b6f1 # v4.1.1
        with:
          pkgname: rustledger-bin
          pkgbuild: ./PKGBUILD
          commit_username: rustledger-bot
          commit_email: bot@rustledger.dev
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.RELEASE_TAG }}"

