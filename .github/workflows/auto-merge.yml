# Auto-merge approved bot PRs
#
# Enables GitHub's native auto-merge for Dependabot and release-plz PRs
# once they've been approved. This adds them to GitHub's merge queue.
#
# Works with Mergify's auto-approve rules to create a fully automated
# dependency update pipeline.

name: Auto Merge

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run for bot PRs
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      (github.event.pull_request.user.login == 'github-actions[bot]' &&
       contains(github.event.pull_request.labels.*.name, 'release'))
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Don't specify merge method - the merge queue controls this
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto
