# Supply Chain Security
# Audits dependencies using cargo-vet and generates SBOM
name: Supply Chain
on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'supply-chain/**'
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'supply-chain/**'
  schedule:
    # Weekly on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  # Audit dependencies with cargo-vet
  cargo-vet:
    name: Cargo Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - name: Install cargo-vet
        run: cargo install cargo-vet
      - name: Run cargo vet
        run: cargo vet --locked
  # Generate SBOM on push to main
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate SBOM (CycloneDX)
        run: cargo cyclonedx --format json > sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
  # Dependency review for PRs (catches new vulnerable deps)
  #
  # License Policy:
  # - Permissive licenses (MIT, Apache-2.0, BSD-*, ISC, Zlib, 0BSD): Always allowed
  # - Apache-2.0 WITH LLVM-exception: Permissive (used by Wasmtime/Cranelift), allowed
  # - Unicode-3.0, CDLA-Permissive-2.0: Data/content licenses, allowed
  # - MPL-2.0: Weak copyleft (file-level), allowed for dependencies
  # - LGPL-3.0: Weak copyleft (linking), allowed for build tools (e.g., rust-cache action)
  # - GPL-3.0-only: Strong copyleft, allowed ONLY for build/dev tools not linked into binaries
  #
  # Do NOT add: GPL-2.0, AGPL-*, proprietary, or unknown licenses without review
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          # See License Policy comment above before adding new licenses
          allow-licenses: >-
            MIT, Apache-2.0, Apache-2.0 WITH LLVM-exception, BSD-2-Clause, BSD-3-Clause, ISC, GPL-3.0-only, MPL-2.0, Zlib, 0BSD, Unicode-3.0, CDLA-Permissive-2.0, LGPL-3.0, CC0-1.0, MIT-0, NCSA, bzip2-1.0.6
          # These packages use non-SPDX "MIT/Apache-2.0" license field that
          # the dependency review action can't parse. Both MIT and Apache-2.0
          # are in our allow list; exempt these packages from the license check.
          allow-dependencies-licenses: "pkg:cargo/bigdecimal, pkg:cargo/format_num_pattern, pkg:cargo/linfa, pkg:cargo/linfa-bayes, pkg:cargo/ndarray, pkg:cargo/semver"
