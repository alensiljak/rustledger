# Mergify configuration
# https://docs.mergify.com/configuration/file-format/
#
# Auto-merges PRs from trusted bots when CI passes.
# Requires Mergify GitHub App: https://github.com/apps/mergify

# Required for "Require branches to be up to date" branch protection
merge_queue:
  max_parallel_checks: 1

# Queue rules define how PRs are merged
queue_rules:
  - name: default
    merge_method: squash
    batch_size: 1
    commit_message_template: |
      {{ title }} (#{{ number }})

      {{ body | get_section("Release notes") or body }}

  - name: release
    merge_method: merge
    batch_size: 1
    commit_message_template: |
      {{ title }} (#{{ number }})

pull_request_rules:
  # Auto-assign all PRs to maintainer
  - name: Auto-assign PRs
    conditions:
      - -draft
    actions:
      assign:
        users:
          - robcohen

  # Auto-merge Dependabot PRs (dependency updates)
  - name: Auto-merge Dependabot PRs
    conditions:
      - author=dependabot[bot]
      - check-success=build
      - -draft
    actions:
      queue:
        name: default

  # Auto-merge release-plz PRs (version bumps and changelog)
  - name: Auto-merge release-plz PRs
    conditions:
      - author=github-actions[bot]
      - label=release
      - check-success=build
      - -draft
    actions:
      queue:
        name: release

  # Auto-approve Dependabot PRs (minor/patch updates only)
  - name: Auto-approve Dependabot minor/patch
    conditions:
      - author=dependabot[bot]
      - or:
        - title~=(?i).*bump .* from .* to .*  # single package bumps
        - title~=(?i).*bump the .* group.*    # grouped dependency updates
        - title~=(?i).*update .* requirement
      - -title~=(?i)major  # exclude major updates
    actions:
      review:
        type: APPROVE
        message: Auto-approved minor/patch dependency update.

  # Request review for major Dependabot updates
  - name: Request review for major updates
    conditions:
      - author=dependabot[bot]
      - title~=(?i)major
    actions:
      comment:
        message: |
          This is a **major** dependency update. Please review carefully for breaking changes.

  # Delete head branch after merge
  - name: Delete branch after merge
    conditions:
      - merged
    actions:
      delete_head_branch:
